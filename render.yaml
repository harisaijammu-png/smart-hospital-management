services:
  - type: web
    name: smart-hospital-management
    env: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: hospital-mysql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: hospital-mysql
          property: port
      - key: DB_USER
        fromDatabase:
          name: hospital-mysql
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: hospital-mysql
          property: password
      - key: DB_NAME
        value: hospital_db

  - type: mysql
    name: hospital-mysql
    plan: free
    ipAllowList: []
